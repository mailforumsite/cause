<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0b2d57" />
  <title>Пострадали | Силни сме заедно</title>
  <style>
    :root {
      --bg: #eef3f8;
      --surface: #ffffff;
      --nav: #0b2d57;
      --nav-2: #123d74;
      --text: #18253a;
      --muted: #5f6f85;
      --primary: #1f73d8;
      --primary-hover: #165fba;
      --border: #d8e1ec;
      --shadow: 0 10px 30px rgba(8, 28, 54, 0.08);
      --radius: 18px;
      --max: 1180px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    img { max-width: 100%; display: block; }
    a { color: inherit; text-decoration: none; }

    .container {
      width: min(100% - 32px, var(--max));
      margin: 0 auto;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: linear-gradient(180deg, var(--nav) 0%, var(--nav-2) 100%);
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.15);
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 82px;
      padding: 10px 0;
      position: relative;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-img {
      width: 84px;
      height: 84px;
    }

    .menu-toggle {
      border: 1px solid rgba(255,255,255,0.22);
      background: rgba(255,255,255,0.08);
      color: #fff;
      width: 48px;
      height: 48px;
      border-radius: 14px;
      font-size: 22px;
      cursor: pointer;
    }

    .menu { display: none; }
    .menu.open { display: block; }

    .menu-links {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 14px;
    }

    .menu-links a {
      color: #fff;
      font-weight: 700;
    }

    .hero { padding: 34px 0 18px; }

    .hero-card {
      background: #fff;
      border-radius: 28px;
      padding: 28px;
    }

    h1 { margin: 0; }

    .video-grid {
      display: grid;
      gap: 20px;
    }

    @media (min-width: 700px) {
      .video-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (min-width: 980px) {
      .video-grid { grid-template-columns: repeat(3, 1fr); }
    }

    .video-card {
      background: #fff;
      border-radius: 24px;
      overflow: hidden;
    }

    .video-frame {
      aspect-ratio: 16 / 9;
    }

    .video-frame iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }

  </style>
</head>
<body>

<header class="topbar">
  <div class="container">
    <div class="nav">
      <a href="index.html">
        <img src="images/logo.png" class="logo-img">
      </a>

      <button id="menuToggle" class="menu-toggle">☰</button>

      <nav id="menu" class="menu">
        <div class="menu-links">
          <a href="index.html">Начало</a>
          <a href="postradali.html">Пострадали</a>
          <a href="http://cause.page.gd/phpBB3/index.php">Форум</a>
          <a href="contact.html">Пиши ни</a>
        </div>
      </nav>
    </div>
  </div>
</header>

<main>
<section class="hero">
  <div class="container">
    <div class="hero-card">
      <h1>Жертви на фалшиво позитивните полеви тестове</h1>
    </div>
  </div>
</section>

<section>
  <div class="container">

    <div id="videosContainer" class="video-grid"></div>

    <button id="loadBtn" onclick="loadMore()" style="
      display:block;
      margin:20px auto;
      padding:12px 20px;
      background:#1f73d8;
      color:#fff;
      border:none;
      border-radius:10px;
      font-size:18px;
      cursor:pointer;
    ">
      Още
    </button>

  </div>
</section>
</main>

<footer>
  <div class="container">Силни сме заедно</div>
</footer>

<script>
const allVideos = [
  "bbOfzfp6by0",
  "43enzylDmiw",
  "ctpqyac4hRc",
  "3vKX83nctC8",
  "lwugNbpPxvw",
  "qcLjjiUeQEc",
  "UdRJNNySBJQ",
  "0CfsI_v0qhA",
  "_gezUQa2gr0"
];

let current = 0;

function loadMore() {
  const container = document.getElementById("videosContainer");

  for (let i = 0; i < 6; i++) {
    if (current >= allVideos.length) return;

    container.innerHTML += `
      <article class="video-card">
        <div class="video-frame">
          <iframe src="https://www.youtube.com/embed/${allVideos[current]}" allowfullscreen></iframe>
        </div>
      </article>
    `;

    current++;
  }
}

loadMore();
</script>

<script>
const toggle = document.getElementById('menuToggle');
const menu = document.getElementById('menu');

toggle.addEventListener('click', () => {
  menu.classList.toggle('open');
});
</script>

</body>
</html>
