<script>
const allVideos = [
  "bbOfzfp6by0",
  "43enzylDmiw",
  "ctpqyac4hRc",
  "3vKX83nctC8",
  "lwugNbpPxvw",
  "qcLjjiUeQEc",
  "UdRJNNySBJQ",
  "0CfsI_v0qhA",
  "_gezUQa2gr0"
];

let current = 0;
const perLoad = 6;

function loadMore() {
  const container = document.getElementById("videosContainer");
  const btn = document.getElementById("loadBtn");

  for (let i = 0; i < perLoad; i++) {
    if (current >= allVideos.length) {
      btn.style.display = "none";
      return;
    }

    container.innerHTML += `
      <div style="margin-bottom:20px;">
        <iframe 
          src="https://www.youtube.com/embed/${allVideos[current]}" 
          style="width:100%; aspect-ratio:16/9; border-radius:16px;" 
          allowfullscreen>
        </iframe>
      </div>
    `;

    current++;
  }
}

loadMore();
</script>

<script>
