<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0b2d57" />
  <title>Пострадали | Силни сме заедно</title>
  <style>
    :root {
      --bg: #eef3f8;
      --surface: #ffffff;
      --nav: #0b2d57;
      --nav-2: #123d74;
      --text: #18253a;
      --muted: #5f6f85;
      --primary: #1f73d8;
      --primary-hover: #165fba;
      --border: #d8e1ec;
      --shadow: 0 10px 30px rgba(8, 28, 54, 0.08);
      --radius: 18px;
      --max: 1180px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    img { max-width: 100%; display: block; }
    a { color: inherit; text-decoration: none; }

    .container {
      width: min(100% - 32px, var(--max));
      margin: 0 auto;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: linear-gradient(180deg, var(--nav) 0%, var(--nav-2) 100%);
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.15);
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 82px;
      padding: 10px 0;
      position: relative;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
      flex: 0 1 auto;
    }

    .logo-img {
      width: 84px;
      height: 84px;
      object-fit: contain;
      flex: 0 0 auto;
    }

    .menu-toggle {
      border: 1px solid rgba(255,255,255,0.22);
      background: rgba(255,255,255,0.08);
      color: #fff;
      width: 48px;
      height: 48px;
      border-radius: 14px;
      font-size: 22px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
    }

    .menu {
      display: none;
      width: 100%;
      padding: 0 0 18px;
    }

    .menu.open { display: block; }

    .menu-links {
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 18px;
      padding: 14px;
    }

    .menu-links a {
      color: #fff;
      font-weight: 700;
      padding: 10px 12px;
      border-radius: 12px;
      font-size: 18px;
    }

    .menu-links a:hover,
    .menu-links a.active {
      background: rgba(255,255,255,0.12);
    }

    .socials {
      display: flex;
      gap: 10px;
      margin-top: 6px;
      padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,0.14);
    }

    .socials a {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: rgba(255,255,255,0.1);
      color: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 700;
    }

    .hero {
      padding: 34px 0 18px;
    }

    .hero-card {
      background: linear-gradient(135deg, #ffffff 0%, #f4f8fc 100%);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 28px 20px;
    }

    .eyebrow {
      display: inline-block;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--primary);
      background: rgba(31, 115, 216, 0.08);
      padding: 8px 12px;
      border-radius: 999px;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(30px, 6vw, 56px);
      line-height: 1.07;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      font-size: 18px;
      max-width: 760px;
    }

    .hero-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 22px;
    }

    .btn {
      min-height: 52px;
      padding: 14px 18px;
      border-radius: 14px;
      font-weight: 800;
      font-size: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      border: 1px solid transparent;
      transition: 0.2s ease;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 10px 20px rgba(31, 115, 216, 0.22);
    }

    .btn-primary:hover { background: var(--primary-hover); }

    .btn-secondary {
      background: #fff;
      color: var(--text);
      border-color: var(--border);
    }

    .btn-secondary:hover { background: #f7faff; }

    .section {
      padding: 18px 0 34px;
    }

    .section-title {
      font-size: clamp(28px, 4vw, 40px);
      margin: 0 0 10px;
    }

    .section-intro {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 17px;
      max-width: 820px;
    }

    .video-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    .video-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .video-frame {
      aspect-ratio: 16 / 9;
      background: #dfe7f0;
    }

    .video-frame iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }

    .video-content {
      padding: 18px;
    }

    .video-content h3 {
      margin: 0 0 8px;
      font-size: 22px;
      line-height: 1.2;
    }

    .video-content p {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 15px;
    }

    .video-content {
      display: none;
    }
    
    .video-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .ghost-box {
      background: var(--surface);
      border: 1px dashed #b8c6d8;
      border-radius: 24px;
      padding: 22px;
      color: var(--muted);
      box-shadow: var(--shadow);
    }

    .ghost-box strong {
      display: block;
      margin-bottom: 8px;
      color: var(--text);
      font-size: 18px;
    }

    footer {
      padding: 20px 0 38px;
      color: var(--muted);
      font-size: 14px;
    }

    @media (min-width: 700px) {
      .hero-actions {
        flex-direction: row;
        flex-wrap: wrap;
      }

      .video-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (min-width: 980px) {
      .nav {
        min-height: 92px;
      }

      .menu-toggle {
        display: none;
      }

      .menu {
        display: block !important;
        width: auto;
        padding: 0;
        flex: 1 1 auto;
      }

      .menu-links {
        flex-direction: row;
        align-items: center;
        justify-content: flex-end;
        gap: 4px;
        padding: 0;
        background: transparent;
        border: 0;
      }

      .menu-links a {
        padding: 10px 12px;
        white-space: nowrap;
      }

      .socials {
        margin: 0 0 0 10px;
        padding: 0 0 0 10px;
        border-top: 0;
        border-left: 1px solid rgba(255,255,255,0.16);
      }

      .hero-card {
        padding: 42px;
      }

      .video-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="container">
      <div class="nav">
        <a class="brand" href="index.html">
          <img src="images/logo.png" alt="Силни сме заедно" class="logo-img">

        <button id="menuToggle" class="menu-toggle" aria-label="Отвори меню">☰</button>

        <nav id="menu" class="menu">
          <div class="menu-links">

            <a href="http://cause.page.gd/phpBB3/index.php">Форум</a>

              <a href="https://www.facebook.com/groups/972347794868457" aria-label="Facebook">f</a>
              <a href="https://www.youtube.com/@silnismezaedno" aria-label="YouTube">▶</a>
            </div>
          </div>
        </nav>
      </div>
    </div>

      <div class="container">
        <div class="hero-card">

          <h1>Жертви на фалшиво позитивните полеви тестове</h1>

      <div class="container">
        <div class="video-grid">
          <article class="video-card">

              <iframe src="https://www.youtube.com/embed/bbOfzfp6by0" title="Видео 1" allowfullscreen></iframe>

         <article class="video-card">
            <div class="video-frame">
              <iframe src="https://www.youtube.com/embed/43enzylDmiw" title="Видео 2" allowfullscreen></iframe>

          </article>

         <article class="video-card">
            <div class="video-frame">
              <iframe src="https://www.youtube.com/embed/ctpqyac4hRc" title="Видео 3" allowfullscreen></iframe>
            </div>

         <article class="video-card">
            <div class="video-frame">
              <iframe src="https://www.youtube.com/embed/3vKX83nctC8" title="Видео 4" allowfullscreen></iframe>

          <article class="video-card">

              <iframe src="https://www.youtube.com/embed/lwugNbpPxvw" title="Видео 5" allowfullscreen></iframe>

          <article class="video-card">
            <div class="video-frame">
              <iframe src="https://www.youtube.com/embed/qcLjjiUeQEc" title="Видео 6" allowfullscreen></iframe>
            </div>
          </article>
          
          <article class="video-card">
            <div class="video-frame">
              <iframe src="https://www.youtube.com/embed/UdRJNNySBJQ" title="Видео 7" allowfullscreen></iframe>
            </div>
          </article>
          
          <article class="video-card">
            <div class="video-frame">
              <iframe src="https://www.youtube.com/embed/0CfsI_v0qhA" title="Видео 8" allowfullscreen></iframe>
            </div>

          <article class="video-card">

              <iframe src="https://www.youtube.com/embed/_gezUQa2gr0" title="Видео 8" allowfullscreen></iframe>

        </div>
      </div>
    </section>
  </main>

  <footer>
    <div class="container">
      Силни сме заедно
    </div>
  </footer>

  <script>
    const toggle = document.getElementById('menuToggle');
    const menu = document.getElementById('menu');
    const links = menu.querySelectorAll('a');

    toggle.addEventListener('click', () => {
      menu.classList.toggle('open');
      toggle.textContent = menu.classList.contains('open') ? '✕' : '☰';
    });

    links.forEach(link => {
      link.addEventListener('click', () => {
        if (window.innerWidth < 980) {
          menu.classList.remove('open');
          toggle.textContent = '☰';
        }
      });
    });
  </script>
</body>
</html>
