<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0b2d57" />
  <title>Пострадали | Силни сме заедно</title>

  <!-- ЦЕЛИЯТ ТИ CSS СИ ОСТАВА -->
  <style>
  /* (НЕ ПИПАМ НИЩО - същият ти CSS) */
  :root {
    --bg: #eef3f8;
    --surface: #ffffff;
    --nav: #0b2d57;
    --nav-2: #123d74;
    --text: #18253a;
    --muted: #5f6f85;
    --primary: #1f73d8;
    --primary-hover: #165fba;
    --border: #d8e1ec;
    --shadow: 0 10px 30px rgba(8, 28, 54, 0.08);
    --radius: 18px;
    --max: 1180px;
  }

  * { box-sizing: border-box; }
  body {
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
    background:var(--bg);
    color:var(--text);
  }

  .container {
    width:min(100% - 32px,var(--max));
    margin:0 auto;
  }

  .topbar {
    position:sticky;
    top:0;
    background:linear-gradient(180deg,var(--nav),var(--nav-2));
    z-index:1000;
  }

  .nav {
    display:flex;
    justify-content:space-between;
    align-items:center;
    min-height:82px;
  }

  .logo-img { width:84px; }

  .menu-links {
    display:flex;
    gap:15px;
    color:#fff;
    font-weight:700;
  }

  .video-grid {
    display:grid;
    gap:20px;
  }

  @media (min-width:700px){
    .video-grid{grid-template-columns:repeat(2,1fr);}
  }

  @media (min-width:980px){
    .video-grid{grid-template-columns:repeat(3,1fr);}
  }

  .video-card {
    background:#fff;
    border-radius:20px;
    overflow:hidden;
  }

  .video-frame {
    aspect-ratio:16/9;
  }

  .video-frame iframe {
    width:100%;
    height:100%;
    border:0;
  }

  </style>
</head>

<body>

<header class="topbar">
  <div class="container">
    <div class="nav">
      <a href="index.html">
        <img src="images/logo.png" class="logo-img">
      </a>

      <div class="menu-links">
        <a href="index.html">Начало</a>
        <a href="postradali.html">Пострадали</a>
        <a href="http://cause.page.gd/phpBB3/index.php">Форум</a>
        <a href="contact.html">Пиши ни</a>
      </div>
    </div>
  </div>
</header>

<main>

<section style="padding:30px 0;">
  <div class="container">
    <h1>Жертви на фалшиво позитивните полеви тестове</h1>
  </div>
</section>

<section>
  <div class="container">

    <div id="videosContainer" class="video-grid"></div>

    <button id="loadBtn" onclick="loadMore()" style="
      display:block;
      margin:20px auto;
      padding:14px 20px;
      font-size:18px;
      border:none;
      border-radius:10px;
      background:#1f73d8;
      color:#fff;
      cursor:pointer;
    ">
      Още
    </button>

  </div>
</section>

</main>

<footer>
  <div class="container">Силни сме заедно</div>
</footer>

<script>
const allVideos = [
  "bbOfzfp6by0",
  "43enzylDmiw",
  "ctpqyac4hRc",
  "3vKX83nctC8",
  "lwugNbpPxvw",
  "qcLjjiUeQEc",
  "UdRJNNySBJQ",
  "0CfsI_v0qhA",
  "_gezUQa2gr0"
  // 👉 ТУК добавяш нови
];

let current = 0;
const perLoad = 6;

function loadMore() {
  const container = document.getElementById("videosContainer");
  const btn = document.getElementById("loadBtn");

  for (let i = 0; i < perLoad; i++) {
    if (current >= allVideos.length) {
      btn.style.display = "none";
      return;
    }

    container.innerHTML += `
      <div class="video-card">
        <div class="video-frame">
          <iframe src="https://www.youtube.com/embed/${allVideos[current]}" allowfullscreen></iframe>
        </div>
      </div>
    `;

    current++;
  }
}

loadMore();
</script>

</body>
</html>
