<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#0b2d57" />
<title>Силни сме заедно</title>

<style>
:root {
  --bg: #eef3f8;
  --surface: #ffffff;
  --nav: #0b2d57;
  --nav-2: #123d74;
  --text: #18253a;
  --muted: #5f6f85;
  --primary: #1f73d8;
  --primary-hover: #165fba;
  --border: #d8e1ec;
  --shadow: 0 10px 30px rgba(8, 28, 54, 0.08);
  --radius: 18px;
  --max: 1180px;
}

* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
}

.container {
  width: min(100% - 32px, var(--max));
  margin: 0 auto;
}

.logo-img {
  width: 60px;
  height: 60px;
}

/* HEADER */
.topbar {
  background: var(--nav);
  color: white;
}

.nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.menu {
  display: none;
}

.menu.open {
  display: block;
}

.menu-links a {
  display: block;
  padding: 10px;
  color: white;
}

/* HERO */
.hero {
  padding: 20px;
}

.btn {
  display: block;
  margin-top: 10px;
  padding: 12px;
  border-radius: 10px;
  text-align: center;
  font-weight: bold;
}

.btn-primary {
  background: var(--primary);
  color: white;
}

.btn-secondary {
  background: white;
  border: 1px solid #ccc;
}

/* CARDS */
.cards {
  display: grid;
  gap: 10px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 10px;
}

/* DESKTOP */
@media(min-width:900px){
  .cards {
    grid-template-columns: repeat(3,1fr);
  }
  .menu {
    display: block;
  }
  .menu-links a {
    display: inline-block;
  }
}
</style>
</head>

<body>

<header class="topbar">
  <div class="container nav">
    <img src="images/logo.png" class="logo-img">
    <button id="menuToggle">☰</button>
  </div>

  <div id="menu" class="menu container">
    <div class="menu-links">
      <a href="#home">Начало</a>
      <a href="#stories">Истории</a>
      <a href="#info">Информация</a>
      <a href="#stats">Статистика</a>
      <a href="#news">Новини</a>
      <a href="#discussions">Дискусии</a>
    </div>
  </div>
</header>

<main>

<section id="home" class="hero container">
  <h1>Фалшиво положителни тестове</h1>
  <p>Реални случаи и права на шофьорите</p>

  <a class="btn btn-primary" href="#stories">Разкажи история</a>
  <a class="btn btn-secondary" href="#discussions">Дискусии</a>
</section>

<section id="info" class="container">
  <div class="cards">
    <div class="card">
      <h3>Правна информация</h3>
      <p>Права при проверка</p>
    </div>
    <div class="card">
      <h3>Медицинска информация</h3>
      <p>Лекарства и тестове</p>
    </div>
    <div class="card" id="stats">
      <h3>Статистика</h3>
      <p>Данни и анализ</p>
    </div>
  </div>
</section>

<section id="discussions" class="container">
  <h2>Дискусии</h2>

  <a class="btn btn-primary"
     href="https://github.com/mailforumsite/cause/discussions/new"
     target="_blank">
     Създай тема
  </a>

  <a class="btn btn-secondary"
     href="https://github.com/mailforumsite/cause/discussions"
     target="_blank">
     Виж всички
  </a>

  <div style="margin-top:20px;">
    <script src="https://giscus.app/client.js"
      data-repo="mailforumsite/cause"
      data-repo-id="R_kgDOR0ok9Q"
      data-category="General"
      data-category-id="DIC_kwDOR0ok9c4C5m4w"
      data-mapping="pathname"
      data-theme="light"
      data-lang="bg"
      crossorigin="anonymous"
      async>
    </script>
  </div>
</section>

</main>

<script>
document.getElementById("menuToggle").onclick = () => {
  document.getElementById("menu").classList.toggle("open");
}
</script>

</body>
</html>
