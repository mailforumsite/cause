<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0b2d57" />
  <title>Силни сме заедно</title>

  <style>
    :root {
      --bg: #eef3f8;
      --surface: #ffffff;
      --nav: #0b2d57;
      --nav-2: #123d74;
      --text: #18253a;
      --muted: #5f6f85;
      --primary: #1f73d8;
      --primary-hover: #165fba;
      --border: #d8e1ec;
      --shadow: 0 10px 30px rgba(8, 28, 54, 0.08);
      --radius: 18px;
      --max: 1180px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    img { max-width: 100%; display: block; }
    a { color: inherit; text-decoration: none; }

    .container {
      width: min(100% - 32px, var(--max));
      margin: 0 auto;
    }

    .logo-img {
      width: 70px;
      height: 70px;
      object-fit: contain;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: linear-gradient(180deg, var(--nav) 0%, var(--nav-2) 100%);
      box-shadow: 0 4px 18px rgba(0,0,0,0.15);
    }

    .nav {
      min-height: 78px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 0;
    }

    .brand-text {
      color: #fff;
      font-weight: 800;
      font-size: 20px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .menu-toggle {
      border: 1px solid rgba(255,255,255,0.22);
      background: rgba(255,255,255,0.08);
      color: #fff;
      width: 48px;
      height: 48px;
      border-radius: 14px;
      font-size: 22px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .menu {
      display: none;
      width: 100%;
      padding: 0 0 18px;
    }

    .menu.open { display: block; }

    .menu-links {
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 18px;
      padding: 14px;
    }

    .menu-links a {
      color: #fff;
      font-weight: 700;
      padding: 10px 12px;
      border-radius: 12px;
    }

    .menu-links a:hover { background: rgba(255,255,255,0.09); }

    .socials {
      display: flex;
      gap: 10px;
      margin-top: 6px;
      padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,0.14);
    }

    .socials a {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: rgba(255,255,255,0.1);
      color: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .hero {
      padding: 34px 0 18px;
    }

    .hero-card {
      background: linear-gradient(135deg, #ffffff 0%, #f4f8fc 100%);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 28px 20px;
    }

    .eyebrow {
      display: inline-block;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--primary);
      background: rgba(31, 115, 216, 0.08);
      padding: 8px 12px;
      border-radius: 999px;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(30px, 6vw, 56px);
      line-height: 1.07;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      font-size: 18px;
      max-width: 760px;
    }

    .hero-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 22px;
    }

    .btn {
      min-height: 52px;
      padding: 14px 18px;
      border-radius: 14px;
      font-weight: 800;
      font-size: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      border: 1px solid transparent;
      transition: 0.2s ease;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 10px 20px rgba(31, 115, 216, 0.22);
    }

    .btn-primary:hover { background: var(--primary-hover); }

    .btn-secondary {
      background: #fff;
      color: var(--text);
      border-color: var(--border);
    }

    .btn-secondary:hover { background: #f7faff; }

    .quick-links {
      padding: 8px 0 22px;
    }

    .quick-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .quick-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow);
    }

    .quick-item strong {
      display: block;
      margin-bottom: 6px;
      font-size: 18px;
    }

    .section {
      padding: 18px 0 34px;
    }

    .section-title {
      font-size: clamp(28px, 4vw, 40px);
      margin: 0 0 18px;
    }

    .cards {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 24px 20px;
    }

    .card h3 {
      margin: 0 0 14px;
      font-size: 28px;
      line-height: 1.15;
    }

    .card ul {
      margin: 0;
      padding-left: 18px;
      color: var(--muted);
    }

    .card li + li { margin-top: 10px; }

    .cta {
      padding: 8px 0 40px;
    }

    .cta-box {
      background: linear-gradient(135deg, var(--nav) 0%, var(--nav-2) 100%);
      color: #fff;
      border-radius: 28px;
      padding: 28px 20px;
      box-shadow: var(--shadow);
    }

    .cta-box h2 {
      margin: 0 0 10px;
      font-size: clamp(28px, 4vw, 40px);
      line-height: 1.1;
    }

    .cta-box p {
      margin: 0;
      color: rgba(255,255,255,0.84);
      max-width: 720px;
    }

    .cta-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 20px;
    }

    .cta .btn-secondary {
      background: rgba(255,255,255,0.1);
      color: #fff;
      border-color: rgba(255,255,255,0.2);
    }

    footer {
      padding: 20px 0 38px;
      color: var(--muted);
      font-size: 14px;
    }

    @media (min-width: 700px) {
      .hero-actions,
      .cta-actions {
        flex-direction: row;
        flex-wrap: wrap;
      }

      .quick-list,
      .cards {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (min-width: 980px) {
      .menu-toggle { display: none; }

      .nav {
        min-height: 90px;
      }

      .menu {
        display: block !important;
        width: auto;
        padding: 0;
      }

      .menu-links {
        flex-direction: row;
        align-items: center;
        gap: 8px;
        padding: 0;
        background: transparent;
        border: 0;
      }

      .menu-links a {
        padding: 10px 14px;
      }

      .socials {
        margin: 0 0 0 8px;
        padding: 0 0 0 10px;
        border: 0;
      }

      .quick-list {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .cards {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .hero-card,
      .cta-box {
        padding: 42px;
      }
    }
  </style>
</head>
<body>

<header class="topbar">
  <div class="container">
    <div class="nav">
      <img src="images/logo.png" alt="logo" class="logo-img">
      <div class="brand-text">Силни сме заедно</div>
      <button id="menuToggle" class="menu-toggle" aria-label="Отвори меню">☰</button>
    </div>

    <nav id="menu" class="menu">
      <div class="menu-links">
        <a href="#home">Начало</a>
        <a href="#stories">Истории</a>
        <a href="#info">Информация</a>
        <a href="#stats">Статистика</a>
        <a href="#news">Новини</a>
        <a href="#discussions">Дискусии</a>
        <a href="#help">Помощ</a>

        <div class="socials">
          <a href="#" aria-label="Facebook">f</a>
          <a href="#" aria-label="YouTube">▶</a>
        </div>
      </div>
    </nav>
  </div>
</header>

<main>
  <!-- тук остава сегашното ти съдържание -->
</main>

<footer id="help">
  <div class="container">
    Сайтът е примерна начална версия.
  </div>
</footer>

<script>
  const toggle = document.getElementById('menuToggle');
  const menu = document.getElementById('menu');
  const links = menu.querySelectorAll('a');

  toggle.addEventListener('click', () => {
    menu.classList.toggle('open');
    toggle.textContent = menu.classList.contains('open') ? '✕' : '☰';
  });

  links.forEach(link => {
    link.addEventListener('click', () => {
      if (window.innerWidth < 980) {
        menu.classList.remove('open');
        toggle.textContent = '☰';
      }
    });
  });
</script>

</body>
</html>
