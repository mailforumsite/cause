<!DOCTYPE html>

<title>Контакт</title>

<style>
:root {
  --bg: #eef3f8;
  --surface: #ffffff;
  --nav: #0b2d57;
  --nav-2: #123d74;
  --text: #18253a;
  --muted: #5f6f85;
  --primary: #1f73d8;
  --primary-hover: #165fba;
  --border: #d8e1ec;
  --shadow: 0 10px 30px rgba(8, 28, 54, 0.08);
  --radius: 18px;
  --max: 1180px;
}

* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
}

.container {
  width: min(100% - 32px, var(--max));
  margin: 0 auto;
}

/* HEADER (копие от твоя) */
.topbar {
  position: sticky;
  top: 0;
  z-index: 1000;
  background: linear-gradient(180deg, var(--nav) 0%, var(--nav-2) 100%);
  box-shadow: 0 4px 18px rgba(0, 0, 0, 0.15);
}

.nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  min-height: 82px;
  padding: 10px 0;
}

.logo-img {
  width: 84px;
  height: 84px;
  object-fit: contain;
}

.menu-links {
  display: flex;
  gap: 16px;
  align-items: center;
}

.menu-links a {
  color: #fff;
  font-weight: 700;
}

/* FORM */
.section {
  padding: 40px 0;
}

.card {
  max-width: 600px;
  margin: auto;
  background: var(--surface);
  border-radius: 24px;
  padding: 30px;
  box-shadow: var(--shadow);
}

h2 {
  margin-top: 0;
}

input, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  font-size: 16px;
}

button {
  margin-top: 15px;
  width: 100%;
  padding: 14px;
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: 10px;
  font-weight: 700;
  cursor: pointer;
}

button:hover {
  background: var(--primary-hover);
}

.success {
  display: none;
  margin-top: 15px;
  color: green;
  font-weight: bold;
}
</style>

</head>

<body>

<header class="topbar">
  <div class="container">
    <div class="nav">
      <a href="index.html">
        <img src="images/logo.png" class="logo-img">
      </a>

  <div class="menu-links">

    <a href="#">Контакт</a>
  </div>
</div>
```

  </div>
</header>

<section class="section">
  <div class="container">
    <div class="card">

```
  <h2>Свържи се с нас</h2>

  <form id="form">
    <input type="hidden" name="access_key" value="aea944d8-cb48-411e-a9c4-4db88fc22954">

    <!-- anti spam -->
    <input type="checkbox" name="botcheck" style="display:none;">

    <input type="text" name="name" placeholder="Име" required>
    <input type="email" name="email" placeholder="Имейл" required>
    <textarea name="message" rows="5" placeholder="Съобщение" required></textarea>

    <button type="submit">Изпрати</button>
  </form>

  <div class="success" id="success">
    Съобщението е изпратено успешно!
  </div>

</div>
```

  </div>
</section>

<script>
const form = document.getElementById("form");
const success = document.getElementById("success");

form.addEventListener("submit", async function(e) {
  e.preventDefault();

  const data = new FormData(form);

  const res = await fetch("https://api.web3forms.com/submit", {
    method: "POST",
    body: data
  });

  if (res.ok) {
    form.reset();
    success.style.display = "block";
  } else {
    alert("Грешка при изпращане");
  }
});
</script>

</body>
